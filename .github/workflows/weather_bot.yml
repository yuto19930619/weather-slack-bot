name: Weather Slack Bot

# 実行トリガーの設定
on:
  schedule:
    # 毎日日本時間の朝8:00 (UTC 23:00) に実行
    - cron: '0 10 * * *'
  # GitHubの画面から手動でも実行できるようにする
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4
      
      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: 依存パッケージのインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 天気予報Botの実行
        env:
          # GitHub Secrets からWebhook URLを読み込む
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AREA_CODE: "080000"
          AREA_NAME: 北部
        run: python main.py
